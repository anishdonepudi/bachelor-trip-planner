name: Scrape Flights & Airbnb

on:
  schedule:
    # Run every 12 hours at 6:00 AM and 6:00 PM UTC
    - cron: "0 6,18 * * *"

  workflow_dispatch:
    inputs:
      scrape_type:
        description: "What to scrape"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - flights
          - airbnb

  repository_dispatch:
    types: [config-changed]

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  # Step 1: Read config from Supabase and build airport matrix
  setup-matrix:
    name: Build Airport Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.scrape_type == 'all' || github.event.inputs.scrape_type == 'flights'))
    outputs:
      matrix: ${{ steps.get-matrix.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get airport matrix from config
        id: get-matrix
        run: |
          MATRIX=$(npx tsx scripts/get-airport-matrix.ts)
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  # Step 2: Scrape flights with dynamic matrix
  scrape-flights:
    name: "Flights: ${{ matrix.name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: setup-matrix
    if: needs.setup-matrix.outputs.matrix != ''

    strategy:
      fail-fast: false
      max-parallel: 19
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium browser
        run: npx puppeteer browsers install chrome

      - name: Run flights scraper
        run: npx tsx scripts/scrape-flights.ts
        env:
          AIRPORTS: ${{ matrix.airports }}
          GITHUB_RUN_ID: ${{ github.run_id }}

  aggregate-flights:
    name: Aggregate Best Flights
    runs-on: ubuntu-latest
    needs: scrape-flights
    if: always() && !cancelled()
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Aggregate flight results
        run: npx tsx scripts/aggregate-flights.ts

  scrape-airbnb:
    name: Scrape Airbnb Listings
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.scrape_type == 'all' || github.event.inputs.scrape_type == 'airbnb'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium browser
        run: npx puppeteer browsers install chrome

      - name: Run Airbnb scraper
        run: npx tsx scripts/scrape-airbnb.ts
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
