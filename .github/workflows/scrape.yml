name: Scrape Flights & Airbnb

on:
  schedule:
    # Run every 4 hours (6 times a day)
    - cron: "0 */4 * * *"

  workflow_dispatch:
    inputs:
      scrape_type:
        description: "What to scrape"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - flights
          - airbnb
      triggered_by:
        description: "Who triggered this run"
        required: false
        default: "manual"
        type: string

  repository_dispatch:
    types: [config-changed]

concurrency:
  group: scrape-workflow
  cancel-in-progress: false

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  # Step 1: Read config from Supabase and build airport matrix
  setup-matrix:
    name: Build Airport Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.scrape_type == 'all' || github.event.inputs.scrape_type == 'flights'))
    outputs:
      matrix: ${{ steps.get-matrix.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get airport matrix from config
        id: get-matrix
        run: |
          MATRIX=$(npx tsx scripts/get-airport-matrix.ts)
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  # Step 2: Scrape flights with dynamic matrix (writes to staging)
  scrape-flights:
    name: "Flights: ${{ matrix.name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: setup-matrix
    if: needs.setup-matrix.outputs.matrix != ''

    strategy:
      fail-fast: false
      max-parallel: 19
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium browser
        run: npx puppeteer browsers install chrome

      - name: Run flights scraper
        run: npx tsx scripts/scrape-flights.ts
        env:
          AIRPORTS: ${{ matrix.airports }}
          GITHUB_RUN_ID: ${{ github.run_id }}

  # Step 3: Scrape Airbnb listings (writes to staging)
  scrape-airbnb:
    name: Scrape Airbnb Listings
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.scrape_type == 'all' || github.event.inputs.scrape_type == 'airbnb'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium browser
        run: npx puppeteer browsers install chrome

      - name: Run Airbnb scraper
        run: npx tsx scripts/scrape-airbnb.ts
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}

  # Step 4: Finalize — promote staging to production ONLY if all jobs passed
  finalize:
    name: Finalize Data Refresh
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [scrape-flights, scrape-airbnb]
    if: >-
      !cancelled() &&
      (needs.scrape-flights.result == 'success' || needs.scrape-flights.result == 'skipped') &&
      (needs.scrape-airbnb.result == 'success' || needs.scrape-airbnb.result == 'skipped')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Promote staging data to production
        run: npx tsx scripts/finalize-data.ts
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}

  # Cleanup staging on failure or cancellation so stale data doesn't accumulate
  cleanup-staging:
    name: Cleanup Staging
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [scrape-flights, scrape-airbnb]
    if: >-
      always() &&
      (needs.scrape-flights.result == 'failure' || needs.scrape-airbnb.result == 'failure' ||
       needs.scrape-flights.result == 'cancelled' || needs.scrape-airbnb.result == 'cancelled')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean staging tables
        run: npx tsx scripts/cleanup-staging.ts
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
